name: Backend differential

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  differential:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows / memory + IOCP
            runner: windows-2022
          - name: Linux / memory + epoll
            runner: ubuntu-24.04
          - name: macOS / memory + kqueue
            runner: macos-14
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Meson
        run: python -m pip install meson

      - name: Run canonical backend differential gate
        run: cargo test --test backend_differential -- --nocapture

      - name: Build selected Backend project with CMake and Meson
        run: >-
          cargo test --test generated_project
          selected_backends_build_and_run_with_direct_c_cmake_and_meson
          -- --exact --nocapture
